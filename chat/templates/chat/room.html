{% extends 'core/base.html' %}
{% block title %}{{ room.name }}{% endblock %}

{% block content %}
<div class="flex flex-col h-[calc(100vh-64px)] md:h-[calc(100vh-80px)] w-full overflow-hidden">
    <div class="sticky top-0 z-10 bg-gray-900 p-4 border-b border-gray-700 flex items-center gap-4">
        <a href="javascript:history.back()" class="md:hidden text-gray-400 hover:text-white">
            <i class="fa-solid fa-arrow-left text-xl"></i>
        </a>
        <h1 class="text-xl font-bold">{{ room.name }}</h1>
    </div>

    <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4"></div>

    <div class="sticky bottom-0 bg-gray-800 p-4 border-t border-gray-700 flex gap-2 items-center">
        <input type="text" id="chat-input"
               class="flex-1 bg-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500"
               placeholder="Сообщение">
        <button id="send-btn"
                class="w-10 h-10 rounded-full transition-all duration-200 flex items-center justify-center opacity-0 invisible pointer-events-none">
            <i id="send-icon" class="fa-regular fa-paper-plane text-white"></i>
        </button>
    </div>
</div>

<script>
    const roomSlug = "{{ room.slug }}";
    let ws = null;
    let reconnectTimer = null;
    let reconnectAttempts = 0;
    let pingInterval = null;
    let isConnecting = false;          // Флаг, чтобы не создавать несколько соединений одновременно
    const MAX_RECONNECT_ATTEMPTS = 10; // Максимум попыток переподключения

    function appendMessage(msg) {
        const messagesDiv = document.getElementById('chat-messages');
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('flex', 'flex-col');
        messageDiv.innerHTML = `
            <div class="flex items-start gap-2">
                <div class="w-8 h-8 rounded-full bg-purple-600 flex items-center justify-center text-sm font-bold">
                    ${msg.username[0].toUpperCase()}
                </div>
                <div class="flex-1">
                    <div class="flex items-baseline gap-2">
                        <span class="font-semibold">${escapeHtml(msg.username)}</span>
                        <span class="text-xs text-gray-500">${new Date(msg.created_at).toLocaleTimeString()}</span>
                    </div>
                    <div class="text-gray-300 break-words">${escapeHtml(msg.text)}</div>
                </div>
            </div>
        `;
        messagesDiv.appendChild(messageDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function connectWebSocket() {
        // Защита от параллельных вызовов
        if (isConnecting) {
            console.log('WebSocket connection already in progress, skipping...');
            return;
        }

        // Если уже есть открытое или соединяющееся соединение, не создаём новое
        if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
            console.log('WebSocket already open or connecting, skipping reconnect');
            return;
        }

        // Отменяем предыдущий таймер переподключения, если есть
        if (reconnectTimer) {
            clearTimeout(reconnectTimer);
            reconnectTimer = null;
        }

        isConnecting = true;
        const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
        ws = new WebSocket(`${protocol}${window.location.host}/ws/chat/${roomSlug}/`);

        ws.onopen = () => {
            console.log('WebSocket connected');
            isConnecting = false;
            reconnectAttempts = 0; // Сброс счётчика при успешном подключении

            // Запускаем ping каждые 20 секунд (для нестабильных сетей лучше 20, а не 30)
            if (pingInterval) clearInterval(pingInterval);
            pingInterval = setInterval(() => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    console.log('Sending ping');
                    ws.send(JSON.stringify({ type: 'ping' }));
                }
            }, 20000);
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'history') {
                const messagesDiv = document.getElementById('chat-messages');
                messagesDiv.innerHTML = '';
                data.messages.forEach(msg => appendMessage(msg));
            } else if (data.type === 'pong') {
                console.log('Received pong');
            } else {
                appendMessage(data);
            }
        };

        ws.onclose = (event) => {
            console.log(`WebSocket disconnected, code: ${event.code}, reason: ${event.reason}`);
            isConnecting = false;
            if (pingInterval) clearInterval(pingInterval);

            // Проверяем, не превышено ли максимальное число попыток
            if (reconnectAttempts >= MAX_RECONNECT_ATTEMPTS) {
                console.error(`Max reconnect attempts (${MAX_RECONNECT_ATTEMPTS}) reached. Please reload the page.`);
                const messagesDiv = document.getElementById('chat-messages');
                const errorDiv = document.createElement('div');
                errorDiv.classList.add('text-center', 'text-red-500', 'p-4', 'bg-gray-800', 'rounded');
                errorDiv.innerText = 'Не удалось подключиться к чату. Перезагрузите страницу.';
                messagesDiv.appendChild(errorDiv);
                return;
            }

            // Экспоненциальная задержка, но не более 30 секунд
            let delay = Math.min(30000, 3000 * Math.pow(1.5, reconnectAttempts));
            console.log(`Reconnecting in ${delay/1000}s... (attempt ${reconnectAttempts + 1}/${MAX_RECONNECT_ATTEMPTS})`);
            reconnectTimer = setTimeout(() => {
                connectWebSocket();
            }, delay);
            reconnectAttempts++;
        };

        ws.onerror = (error) => {
            console.error('WebSocket error:', error);
            // onerror не закрывает соединение, onclose вызовется позже
        };
    }

    // Запускаем соединение
    connectWebSocket();

    // ---------- Логика кнопки отправки сообщения ----------
    const sendBtn = document.getElementById('send-btn');
    const chatInput = document.getElementById('chat-input');
    const sendIcon = document.getElementById('send-icon');

    function updateSendButton() {
        const hasText = chatInput.value.trim().length > 0;
        if (hasText) {
            sendBtn.classList.remove('opacity-0', 'invisible', 'pointer-events-none');
            sendBtn.classList.add('opacity-100', 'visible');
            sendIcon.className = 'fa-regular fa-paper-plane';
            sendBtn.disabled = false;
        } else {
            sendBtn.classList.add('opacity-0', 'invisible', 'pointer-events-none');
            sendBtn.classList.remove('opacity-100', 'visible');
            sendBtn.disabled = true;
        }
    }

    chatInput.addEventListener('input', updateSendButton);

    sendBtn.onclick = () => {
        const message = chatInput.value.trim();
        if (message && ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ message: message }));
            chatInput.value = '';
            updateSendButton();
        } else {
            console.warn('Cannot send message, WebSocket is not open');
        }
    };

    updateSendButton();
</script>
{% endblock %}
