{% extends 'core/base.html' %}
{% block title %}{{ room.name }}{% endblock %}

{% block content %}
<div class="flex flex-col h-[calc(100vh-64px)] md:h-[calc(100vh-80px)] w-full overflow-hidden">
    <!-- Заголовок с кнопкой назад для мобильных -->
    <div class="sticky top-0 z-10 bg-gray-900 p-4 border-b border-gray-700 flex items-center gap-4">
        <a href="javascript:history.back()" class="md:hidden text-gray-400 hover:text-white">
            <i class="fa-solid fa-arrow-left text-xl"></i>
        </a>
        <h1 class="text-xl font-bold">{{ room.name }}</h1>
    </div>

    <!-- Контейнер сообщений с прокруткой -->
    <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4"></div>

    <!-- Форма отправки сообщения -->
    <div class="sticky bottom-0 bg-gray-800 p-4 border-t border-gray-700 flex gap-2 items-center">
        <input type="text" id="chat-input"
               class="flex-1 bg-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500"
               placeholder="Сообщение">
        <button id="send-btn"
                class="w-10 h-10 rounded-full transition-all duration-200 flex items-center justify-center opacity-0 invisible pointer-events-none">
            <i id="send-icon" class="fa-regular fa-paper-plane text-white"></i>
        </button>
    </div>
</div>

<script>
    const roomSlug = "{{ room.slug }}";
    let ws;
    let reconnectInterval;

    function appendMessage(msg) {
        const messagesDiv = document.getElementById('chat-messages');
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('flex', 'flex-col');
        messageDiv.innerHTML = `
            <div class="flex items-start gap-2">
                <div class="w-8 h-8 rounded-full bg-purple-600 flex items-center justify-center text-sm font-bold">
                    ${msg.username[0].toUpperCase()}
                </div>
                <div class="flex-1">
                    <div class="flex items-baseline gap-2">
                        <span class="font-semibold">${escapeHtml(msg.username)}</span>
                        <span class="text-xs text-gray-500">${new Date(msg.created_at).toLocaleTimeString()}</span>
                    </div>
                    <div class="text-gray-300 break-words">${escapeHtml(msg.text)}</div>
                </div>
            </div>
        `;
        messagesDiv.appendChild(messageDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function connectWebSocket() {
        ws = new WebSocket(`ws://${window.location.host}/ws/chat/${roomSlug}/`);

        ws.onopen = () => {
            console.log('WebSocket connected');
            if (reconnectInterval) clearInterval(reconnectInterval);
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'history') {
                data.messages.forEach(msg => appendMessage(msg));
            } else {
                appendMessage(data);
            }
        };

        ws.onclose = () => {
            console.log('WebSocket disconnected, reconnecting in 3 seconds...');
            reconnectInterval = setInterval(() => {
                connectWebSocket();
            }, 3000);
        };

        ws.onerror = (error) => console.error('WebSocket error:', error);
    }

    connectWebSocket();

    document.getElementById('send-btn').onclick = () => {
        const input = document.getElementById('chat-input');
        const message = input.value.trim();
        if (message) {
            ws.send(JSON.stringify({ message: message }));
            input.value = '';
        }
    };

const sendBtn = document.getElementById('send-btn');
const chatInput = document.getElementById('chat-input');
const sendIcon = document.getElementById('send-icon');

function updateSendButton() {
    const hasText = chatInput.value.trim().length > 0;

    if (hasText) {
        // Показываем кнопку с иконкой отправки
        sendBtn.classList.remove('opacity-0', 'invisible', 'pointer-events-none');
        sendBtn.classList.add('opacity-100', 'visible');
        sendIcon.className = 'fa-regular fa-paper-plane';
        sendBtn.disabled = false;
    } else {
        // Скрываем кнопку (или можно оставить микрофон, но для простоты скроем)
        sendBtn.classList.add('opacity-0', 'invisible', 'pointer-events-none');
        sendBtn.classList.remove('opacity-100', 'visible');
        sendBtn.disabled = true;
    }
}

// Следим за изменениями в поле ввода
chatInput.addEventListener('input', updateSendButton);

// Переопределяем клик по кнопке (не трогаем существующий ws.onmessage и т.д.)
sendBtn.onclick = () => {
    const message = chatInput.value.trim();
    if (message) {
        ws.send(JSON.stringify({ message: message }));
        chatInput.value = '';
        updateSendButton(); // скрываем кнопку после отправки
    }
};

// Инициализируем состояние
updateSendButton();
</script>
{% endblock %}
