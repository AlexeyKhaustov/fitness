{% extends "admin/change_form.html" %}

{% block extrahead %}
{{ block.super }}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('video_form');
    const fileInput = document.querySelector('input[type="file"][name="file"]');
    const submitBtn = document.querySelector('input[type="submit"]');

    if (!fileInput) return;

    form.addEventListener('submit', async function(e) {
        // Если файл не выбран, отправляем как обычно
        if (!fileInput.files.length) return;

        e.preventDefault();

        const file = fileInput.files[0];
        const formData = new FormData();
        formData.append('file', file);

        // Добавляем CSRF токен
        const csrftoken = document.querySelector('[name=csrfmiddlewaretoken]').value;
        formData.append('csrfmiddlewaretoken', csrftoken);

        // Создаём индикатор прогресса
        const progressDiv = document.createElement('div');
        progressDiv.innerHTML = `
            <div class="progress-bar-container" style="margin: 10px 0; background: #e9ecef; border-radius: 4px; overflow: hidden;">
                <div class="progress-bar" style="width: 0%; background: #79aec8; height: 20px; transition: width 0.3s;"></div>
            </div>
            <p class="progress-text">0%</p>
        `;
        fileInput.parentNode.appendChild(progressDiv);

        // Отключаем кнопку отправки
        submitBtn.disabled = true;
        submitBtn.value = "Загрузка...";

        try {
            // Отправляем файл через fetch с прогрессом
            const uploadResponse = await fetch('/admin/core/video/upload-file/', {
                method: 'POST',
                body: formData,
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                },
                onProgress: (event) => {
                    if (event.lengthComputable) {
                        const percent = (event.loaded / event.total) * 100;
                        const progressBar = document.querySelector('.progress-bar');
                        const progressText = document.querySelector('.progress-text');
                        if (progressBar) progressBar.style.width = percent + '%';
                        if (progressText) progressText.innerText = Math.round(percent) + '%';
                    }
                }
            });

            const uploadResult = await uploadResponse.json();
            if (!uploadResponse.ok) throw new Error(uploadResult.error || 'Ошибка загрузки');

            // Добавляем имя загруженного файла в форму (скрытое поле)
            const hiddenField = document.createElement('input');
            hiddenField.type = 'hidden';
            hiddenField.name = 'uploaded_file';
            hiddenField.value = uploadResult.file_path;
            form.appendChild(hiddenField);

            // Удаляем поле file, чтобы не отправлять его повторно
            fileInput.remove();

            // Отправляем остальные поля формы
            const finalFormData = new FormData(form);
            finalFormData.delete('file');

            const finalResponse = await fetch(form.action, {
                method: 'POST',
                body: finalFormData,
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                }
            });

            if (finalResponse.ok) {
                window.location.href = finalResponse.url || window.location.href;
            } else {
                const error = await finalResponse.json();
                throw new Error(error.error || 'Ошибка сохранения');
            }

        } catch (err) {
            alert('Ошибка: ' + err.message);
            submitBtn.disabled = false;
            submitBtn.value = "Сохранить";
            progressDiv.remove();
        }
    });
});
</script>
{% endblock %}
